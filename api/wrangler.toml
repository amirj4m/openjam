name = "openjam-api"
main = "src/index.ts"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding. The `database_id` is filled in after running
# `npm run d1:create` once. Wrangler prints the UUID; paste it here.
[[d1_databases]]
binding = "DB"
database_name = "openjam"
database_id = "179e8445-002d-44fb-811d-9f4ff1b15a99"

# Per-IP rate limit: 60 requests per 60 seconds on /v1/* endpoints.
# Stops scrapers / abusers without blocking legitimate app traffic.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[routes]]
pattern = "openjam.amirj4m.com"
custom_domain = true

[observability]
enabled = true

[vars]
DATASET_VERSION = "0.8.0"
SCHEMA_VERSION = "1.0.0"
